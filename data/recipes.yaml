# FactoryBoy recipe definitions
# Each recipe: ingredients, products, crafting_time (seconds), machine type.
# Items with no recipe are treated as raw materials by the solver.

recipes:
  # ── Water processing ──────────────────────────────────────────────────────
  steam:
    ingredients:
      water: 10
    products:
      steam: 10
    crafting_time: 1.0
    machine: boiler

  mineralized-water:
    ingredients:
      water: 100
      steam: 100
    products:
      mineralized-water: 100
    crafting_time: 5.0
    machine: chemical-plant

  mineral-sludge:
    ingredients:
      mineralized-water: 10
    products:
      mineral-sludge: 1
    crafting_time: 10.0
    machine: chemical-plant

  # ── Ore extraction ────────────────────────────────────────────────────────
  iron-ore:
    ingredients:
      mineral-sludge: 1
    products:
      iron-ore: 1
      copper-ore: 1
    crafting_time: 10.0
    machine: centrifuge

  copper-ore:
    ingredients:
      mineral-sludge: 1
    products:
      iron-ore: 1
      copper-ore: 1
    crafting_time: 10.0
    machine: centrifuge

  # ── Smelting ──────────────────────────────────────────────────────────────
  iron-plate:
    ingredients:
      iron-ore: 1
    products:
      iron-plate: 1
    crafting_time: 3.2
    machine: stone-furnace

  copper-plate:
    ingredients:
      copper-ore: 1
    products:
      copper-plate: 1
    crafting_time: 3.2
    machine: stone-furnace

  # ── Basic components ──────────────────────────────────────────────────────
  iron-gear-wheel:
    ingredients:
      iron-plate: 2
    products:
      iron-gear-wheel: 1
    crafting_time: 0.5
    machine: assembler-1

  copper-cable:
    ingredients:
      copper-plate: 1
    products:
      copper-cable: 2
    crafting_time: 0.5
    machine: assembler-1

  electronic-circuit:
    ingredients:
      iron-plate: 1
      copper-cable: 3
    products:
      electronic-circuit: 1
    crafting_time: 0.5
    machine: assembler-1

  # ── Science packs ─────────────────────────────────────────────────────────
  automation-science-pack:
    ingredients:
      iron-plate: 1
      copper-plate: 1
    products:
      automation-science-pack: 1
    crafting_time: 5.0
    machine: assembler-1

  logistic-science-pack:
    ingredients:
      electronic-circuit: 1
      iron-gear-wheel: 1
    products:
      logistic-science-pack: 1
    crafting_time: 6.0
    machine: assembler-1
